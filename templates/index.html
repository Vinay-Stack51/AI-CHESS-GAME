<!DOCTYPE html>
<html>

<head>

    <title>AI Chess</title>

    <link rel="stylesheet"
        href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <script src="https://unpkg.com/chess.js@0.10.3/chess.min.js"></script>

    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>

    <style>

        body {
            font-family: Arial;
            text-align: center;
            background-color: #f5f5f5;
        }

        h1 {
            margin-top: 20px;
        }

        #board {
            width: 500px;
            margin: auto;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        select {
            padding: 8px;
            font-size: 16px;
        }

    </style>

</head>

<body>

    <h1>♟️ AI Chess Game</h1>

    <h3>Select Difficulty</h3>

    <select id="difficulty">

        <option value="easy">Easy</option>

        <option value="intermediate">Intermediate</option>

        <option value="hard">Hard</option>

    </select>

    <br><br>

    <div id="board"></div>

    <br>

    <button onclick="resetBoard()">🔄 Restart</button>

    <script>

        // Difficulty selection
        document.getElementById("difficulty").addEventListener("change", function () {

            fetch('/set_difficulty', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    difficulty: this.value
                })

            })

        })


        // Chessboard
        var board = Chessboard('board', {

            draggable: false,

            pieceTheme:
                'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png',

            position: '{{ fen }}'
        });


        // Click-to-move system
        let selectedSquare = null;


        $('#board').on('click', '.square-55d63', function () {

            let square = $(this).attr('data-square');

            // First click
            if (selectedSquare === null) {

                selectedSquare = square;

                $('.square-55d63').css('background', '');

                $(this).css('background', 'yellow');

                return;
            }

            // Second click
            let move = selectedSquare + square;

            fetch('/move', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({
                    move: move
                })

            })

            .then(response => response.json())

            .then(data => {

                $('.square-55d63').css('background', '');

                if (data.status === "ok") {

                    board.position(data.fen);

                } else {

                    alert("Illegal Move");
                }

                selectedSquare = null;

            });

        });


        // Restart game
        function resetBoard() {

            fetch('/reset')

            .then(response => response.json())

            .then(data => {

                board.position(data.fen)

            })
        }

    </script>

</body>

</html>
